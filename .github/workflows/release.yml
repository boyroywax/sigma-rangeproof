name: release

# On a version tag (vX.Y.Z): run the test gate, build, publish to PyPI via
# Trusted Publishing (OIDC, no stored token), and create a GitHub Release with
# the wheel + sdist attached.
#
# Note: GitHub Packages has no Python/pip registry, so the GitHub-side
# distribution is the Release assets below. They install directly, e.g.:
#   pip install https://github.com/boyroywax/sigma-rangeproof/releases/download/vX.Y.Z/sigma_rangeproof-X.Y.Z-py3-none-any.whl
# or straight from the tag: pip install git+https://github.com/boyroywax/sigma-rangeproof@vX.Y.Z

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write   # PyPI Trusted Publishing
  contents: write   # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Test gate (no broken tag gets published)
        run: |
          pip install -e ".[dev]"
          pytest -q --ignore=tests/test_fuzz.py

      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Install from PyPI: `pip install -U sigma-rangeproof`, or use the
            wheel/sdist attached below.

            See the [changelog](https://github.com/boyroywax/sigma-rangeproof/blob/main/CHANGELOG.md)
            and [docs](https://boyroywax.github.io/sigma-rangeproof/).
