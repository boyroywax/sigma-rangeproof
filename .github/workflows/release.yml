name: release

# Publish to PyPI on a version tag, using PyPI Trusted Publishing (OIDC) — no
# token stored. One-time setup on PyPI: project -> Settings -> Publishing ->
# add a GitHub publisher with owner=boyroywax, repo=sigma-rangeproof,
# workflow=release.yml, environment=pypi.

on:
  push:
    tags: ["v*"]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
